# Server Port
server.port=8080

# Database Configuration
# Default: H2 In-Memory Database (Runs immediately without dependencies)
spring.datasource.url=jdbc:h2:mem:personal_finance_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Production/Persistent Option: MySQL (Uncomment to use)
# spring.datasource.url=jdbc:mysql://localhost:3306/personal_finance_manager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring Security & JWT Configurations
# A 256-bit secure key is required for JWT. We configure a default, but it can be overridden in env.
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.jwt.expiration-ms=86400000

# SpringDoc OpenAPI Swagger Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Enable HTTP request body validation errors details
server.error.include-binding-errors=always
server.error.include-message=always
